region: ISO-NE
timezone: America/New_York
hub: .H.INTERNAL_HUB
ingestion:
  mode: sample
  allow_real_to_sample_fallback: true
  enforce_contracts: true
  contracts_path: config/schema_contracts.yml
  manifest_output: reports/isone_ingestion_manifest.json
  raw_snapshot_dir: data/raw/snapshots
sample_data:
  load: data/samples/isone_load_sample.csv
  price: data/samples/isone_price_sample.csv
  weather: data/samples/isone_weather_sample.csv
  queue: data/samples/isone_queue_sample.csv
raw_output:
  load: data/raw/isone_load.csv
  price: data/raw/isone_price.csv
  weather: data/raw/isone_weather.csv
  queue: data/raw/isone_queue.csv
staged_output:
  panel_csv: data/staged/isone_hourly_panel_staged.csv
  queue_csv: data/staged/isone_queue_normalized.csv
curated_output:
  panel_csv: data/curated/isone_hourly_panel.csv
  panel_parquet: data/curated/isone_hourly_panel.parquet
  queue_outlook_csv: data/curated/isone_queue_expected_online_mw.csv
forecast_output:
  backtest_csv: data/marts/isone_load_backtest.csv
  backtest_metrics_csv: data/marts/isone_load_backtest_metrics.csv
  scenarios_csv: data/marts/isone_load_forecast_scenarios.csv
markets_output:
  metrics_csv: data/marts/isone_market_metrics.csv
  hourly_csv: data/marts/isone_market_hourly_enriched.csv
  findings_md: reports/isone_market_findings.md
queue_model_output:
  calibration_csv: data/marts/isone_queue_calibration.csv
finance_output:
  scenarios_csv: data/marts/isone_finance_scenarios.csv
  summary_csv: data/marts/isone_finance_summary.csv
  sensitivity_csv: data/marts/isone_finance_sensitivity.csv
  sensitivity_chart_svg: reports/charts/isone_finance_sensitivity.svg
finance_assumptions:
  capacity_mw: 100
  solar_capacity_factor: 0.16
  project_life_years: 20
  degradation_rate: 0.005
  capex_per_kw: 1350
  fixed_opex_per_kw_year: 17
  debt_fraction: 0.60
  debt_rate: 0.06
  debt_tenor_years: 15
  equity_discount_rate: 0.10
  merchant_basis_discount: 0.90
  contracted_price_adder_usd_mwh: 2.0
  tax_rate: 0.25
reports:
  qa_report: reports/isone_qa_report.md
  metadata_log: reports/isone_ingestion_metadata.log
  charts_dir: reports/charts
